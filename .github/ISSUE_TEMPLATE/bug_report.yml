name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to LinkedIn feed
        2. Open a post with a lead magnet
        3. ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "Chrome 124, Brave 1.65..."
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: César version
      placeholder: "v0.6.0"
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Console logs
      description: If applicable, add screenshots or error logs.
    validations:
      required: false
