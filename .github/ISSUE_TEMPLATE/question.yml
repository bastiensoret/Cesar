name: Question / Support
description: Ask a question or get help
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you need help with?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant details (setup, LLM provider used, etc.)
    validations:
      required: false
