<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>César</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6M9 9h.01M15 9h.01"/>
      </svg>
      <span class="logo-text">César</span>
    </div>
    <label class="header-toggle" title="Toggle detection">
      <input type="checkbox" id="toggle-active" checked aria-label="Toggle César detection">
      <span class="header-toggle-slider"></span>
    </label>
  </div>

  <div class="main">

    <div class="parasite-row">
      <span class="parasite-label">Parasites detected</span>
      <span class="parasite-value" id="posts-flagged">0</span>
    </div>

    <div class="web-search-section">
      <div class="toggle-row">
        <span class="toggle-label">Web search</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-websearch" aria-label="Enable web search">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="web-search-desc">
        AI searches for the exact source online to cite in the comment. More accurate, but slower (~2x).
      </div>
    </div>

    <button class="reveal-btn" id="reveal-btn" aria-expanded="false" aria-controls="reveal-content">
      <span>Settings</span>
      <span class="reveal-arrow"><svg viewBox="0 0 10 6" width="10" height="6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    </button>

    <div class="reveal-content" id="reveal-content">
      <div class="reveal-inner">

        <label class="group-label" for="provider-select">Provider</label>
        <select class="provider-select" id="provider-select" aria-label="LLM provider">
          <option value="auto">Auto-detect</option>
          <option value="anthropic">Anthropic — Haiku 4.5</option>
          <option value="openai">OpenAI — GPT-5 mini</option>
          <option value="gemini">Google — Gemini 3 Flash</option>
          <option value="grok">xAI — Grok 4.1 Fast</option>
        </select>

        <label class="group-label" for="api-key-input">API key</label>
        <div class="api-key-row">
          <input type="password" class="api-key-input" id="api-key-input" placeholder="Paste your API key" aria-label="API key">
          <button class="api-key-btn" id="api-key-save" aria-label="Save API key">OK</button>
        </div>
        <div class="api-status" id="api-status">No API key — regex only</div>

        <span class="group-label" role="heading" aria-level="3">Options</span>

        <div class="setting-row">
          <label class="setting-text" for="toggle-expand">Auto-expand posts</label>
          <span class="toggle">
            <input type="checkbox" id="toggle-expand" aria-label="Auto-expand flagged posts">
            <span class="toggle-slider"></span>
          </span>
        </div>

        <div class="setting-row">
          <label class="setting-text" for="toggle-debug">Mode debug</label>
          <span class="toggle">
            <input type="checkbox" id="toggle-debug" aria-label="Debug mode">
            <span class="toggle-slider"></span>
          </span>
        </div>

      </div>
    </div>

  </div>

  <div class="footer">
    <span class="footer-text">Give back to César</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
